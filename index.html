<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇游戏 🐍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px;
            overflow-x: hidden;
        }
        
        .game-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        
        h1 {
            color: #4ecca3;
            margin-bottom: 10px;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .score-board {
            display: flex;
            justify-content: center;
            gap: clamp(10px, 4vw, 30px);
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .score, .high-score {
            color: #fff;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            padding: clamp(6px, 2vw, 8px) clamp(15px, 4vw, 20px);
            background: rgba(78, 204, 163, 0.2);
            border-radius: 20px;
            border: 2px solid #4ecca3;
        }
        
        #gameCanvas {
            border: 4px solid #4ecca3;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.3);
            background: #0f0f23;
            width: 100%;
            height: auto;
            max-width: 400px;
            display: block;
            margin: 0 auto;
        }
        
        .controls {
            margin-top: 20px;
            color: #aaa;
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
        }
        
        .controls p {
            margin: 5px 0;
        }
        
        .btn {
            padding: clamp(10px, 3vw, 12px) clamp(20px, 5vw, 30px);
            font-size: clamp(1rem, 3vw, 1.1rem);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }
        
        .btn-start {
            background: linear-gradient(45deg, #4ecca3, #38a169);
            color: #fff;
        }
        
        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(78, 204, 163, 0.4);
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #e53e3e;
            display: none;
            z-index: 100;
            width: 80%;
            max-width: 400px;
        }
        
        .game-over h2 {
            color: #e53e3e;
            font-size: clamp(1.5rem, 5vw, 2rem);
            margin-bottom: 20px;
        }
        
        .game-over p {
            color: #fff;
            font-size: clamp(1rem, 3vw, 1.2rem);
            margin-bottom: 20px;
        }
        
        /* 移动端控制按钮 */
        .mobile-controls {
            display: none;
            margin-top: 20px;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            justify-content: center;
        }
        
        @media (max-width: 600px) {
            .mobile-controls {
                display: grid;
            }
            
            .mobile-btn {
                width: clamp(50px, 15vw, 60px);
                height: clamp(50px, 15vw, 60px);
                font-size: clamp(1.2rem, 4vw, 1.5rem);
                border: none;
                border-radius: 10px;
                background: rgba(78, 204, 163, 0.3);
                color: #fff;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                -webkit-tap-highlight-color: transparent;
                touch-action: manipulation;
            }
            
            .mobile-btn:active {
                background: rgba(78, 204, 163, 0.6);
                transform: scale(0.95);
            }
            
            .up { grid-column: 2; grid-row: 1; }
            .left { grid-column: 1; grid-row: 2; }
            .right { grid-column: 3; grid-row: 2; }
            .down { grid-column: 2; grid-row: 3; }
        }
        
        /* 防止移动端点击高亮 */
        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        <div class="score-board">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="high-score">最高分: <span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <p>⬆️ ⬇️ ⬅️ ➡️ 或 W A S D 控制方向</p>
            <p>空格键 暂停/继续</p>
            <button class="btn btn-start" id="startBtn">开始游戏</button>
        </div>
        <div class="mobile-controls">
            <button class="mobile-btn up" data-dir="up">⬆️</button>
            <button class="mobile-btn left" data-dir="left">⬅️</button>
            <button class="mobile-btn right" data-dir="right">➡️</button>
            <button class="mobile-btn down" data-dir="down">⬇️</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');

        // 根据屏幕大小动态调整游戏参数
        function getGameParams() {
            const maxCanvasSize = Math.min(window.innerWidth - 20, 400);
            const gridSize = Math.floor(maxCanvasSize / 20) * 20; // 确保能被20整除
            const tileCount = Math.floor(gridSize / 20);
            return { gridSize, tileCount, canvasSize: gridSize };
        }

        let gameParams = getGameParams();
        let gridSize = gameParams.gridSize;
        let tileCount = gameParams.tileCount;

        // 调整画布大小
        function resizeCanvas() {
            const params = getGameParams();
            gameParams = params;
            gridSize = params.gridSize;
            tileCount = params.tileCount;
            canvas.width = params.canvasSize;
            canvas.height = params.canvasSize;
            
            // 如果游戏正在运行，需要重新生成食物位置
            if (snake.length > 0) {
                spawnFood();
            }
            draw();
        }

        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 100;
        let isRunning = false;
        let isPaused = false;

        highScoreEl.textContent = highScore;

        function initGame() {
            snake = [
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) },
                { x: Math.floor(tileCount / 2) - 1, y: Math.floor(tileCount / 2) },
                { x: Math.floor(tileCount / 2) - 2, y: Math.floor(tileCount / 2) }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 100;
            scoreEl.textContent = score;
            spawnFood();
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = 'rgba(78, 204, 163, 0.1)';
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制食物
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 食物光晕效果
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;

            // 绘制蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );
                
                if (index === 0) {
                    // 蛇头
                    gradient.addColorStop(0, '#4ecca3');
                    gradient.addColorStop(1, '#38a169');
                } else {
                    // 蛇身
                    const alpha = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, `rgba(78, 204, 163, ${alpha})`);
                    gradient.addColorStop(1, `rgba(56, 161, 105, ${alpha})`);
                }
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    Math.max(2, gridSize / 5)
                );
                ctx.fill();

                // 绘制蛇眼睛
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeOffset = gridSize / 4;
                    const eyeSize = Math.max(2, gridSize / 8);
                    
                    if (direction.x === 1) {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.x === -1) {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + eyeOffset, segment.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + eyeOffset, segment.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.y === -1) {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + eyeOffset, segment.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + eyeOffset, segment.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });

            // 暂停提示
            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#4ecca3';
                ctx.font = `bold ${Math.max(20, gridSize/4)}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('已暂停', canvas.width / 2, canvas.height / 2);
                ctx.font = `${Math.max(12, gridSize/8)}px Arial`;
                ctx.fillText('按空格键继续', canvas.width / 2, canvas.height / 2 + gridSize/3);
            }
        }

        function update() {
            if (isPaused) return;

            direction = { ...nextDirection };
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 穿墙
            if (head.x < 0) head.x = tileCount - 1;
            if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1;
            if (head.y >= tileCount) head.y = 0;

            // 检测自身碰撞
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                
                // 加速
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
                
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function gameStep() {
            update();
            draw();
        }

        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#e53e3e';
            ctx.font = `bold ${Math.max(24, gridSize/3)}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束!', canvas.width / 2, canvas.height / 2 - gridSize/4);
            
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.max(14, gridSize/6)}px Arial`;
            ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2 + gridSize/8);
            ctx.fillText('点击"开始游戏"重新开始', canvas.width / 2, canvas.height / 2 + gridSize/2.5);
            
            startBtn.textContent = '重新开始';
        }

        function startGame() {
            if (isRunning) {
                isRunning = false;
                clearInterval(gameLoop);
                startBtn.textContent = '开始游戏';
                return;
            }
            
            initGame();
            isRunning = true;
            isPaused = false;
            startBtn.textContent = '停止游戏';
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isRunning) return;

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
                case ' ':
                    isPaused = !isPaused;
                    draw();
                    break;
            }
        });

        // 移动端控制
        document.querySelectorAll('.mobile-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!isRunning) return;
                
                const dir = btn.dataset.dir;
                switch (dir) {
                    case 'up':
                        if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                        break;
                    case 'down':
                        if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                        break;
                    case 'left':
                        if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                        break;
                    case 'right':
                        if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                        break;
                }
            });
            
            // 添加触摸事件支持
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.click();
            });
        });

        startBtn.addEventListener('click', startGame);

        // 窗口大小改变时重新调整画布
        window.addEventListener('resize', () => {
            resizeCanvas();
        });

        // 初始设置
        resizeCanvas();
        initGame();
        draw();
    </script>
</body>
</html>
